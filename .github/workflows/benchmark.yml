name: benchmark

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Tests
        run: pytest -q
      - name: Small benchmark
        run: python experiments/run_vnext1.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            model_accuracy.csv
            per_regime.csv
            trigger_trajectory.csv
            trigger_summary.csv
